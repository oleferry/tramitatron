id: demo.worker.appointment
name:
  es: Demostración de navegación asistida
  ca-valencia: Demostració de navegació assistida
description:
  es: Ejemplo del asistente que prepara una cita en un portal y te cede el paso final.
  ca-valencia: Exemple de l'assistent que prepara una cita en un portal i et cedix el pas final.
territory: ES
execution_mode: integrated
risk_class: A1
status: available
official_sources: []
requirements:
  - es: El sistema navega el portal de pruebas y precompleta lo que puede.
    ca-valencia: El sistema navega el portal de proves i precompleta el que pot.
  - es: El CAPTCHA y la confirmación de la cita los haces tú.
    ca-valencia: El CAPTCHA i la confirmació de la cita els fas tu.
required_fields: []
# Datos NO sensibles que el kiosco pide antes de preparar la cita, para que el
# worker los precomplete. Las opciones coinciden con el asistente del portal.
intake:
  - key: service
    type: select
    label:
      es: ¿Qué necesitas hacer?
      ca-valencia: Què necessites fer?
    options:
      - value: renovacion-dni
        label:
          es: Renovar el DNI
          ca-valencia: Renovar el DNI
      - value: primera-inscripcion
        label:
          es: Primera inscripción
          ca-valencia: Primera inscripció
  - key: office
    type: select
    label:
      es: ¿En qué oficina?
      ca-valencia: En quina oficina?
    options:
      - value: valladolid-centro
        label:
          es: Valladolid — Centro
          ca-valencia: Valladolid — Centre
      - value: burgos-gamonal
        label:
          es: Burgos — Gamonal
          ca-valencia: Burgos — Gamonal
  - key: date
    type: select
    label:
      es: ¿Qué día?
      ca-valencia: Quin dia?
    options:
      - value: "2026-09-01"
        label:
          es: 1 de septiembre
          ca-valencia: 1 de setembre
      - value: "2026-09-02"
        label:
          es: 2 de septiembre
          ca-valencia: 2 de setembre
  - key: time
    type: select
    label:
      es: ¿A qué hora?
      ca-valencia: A quina hora?
    options:
      - value: "09:00"
        label:
          es: "09:00"
          ca-valencia: "09:00"
      - value: "10:30"
        label:
          es: "10:30"
          ca-valencia: "10:30"
confirmation_required: true
captcha_policy: user_only
document_retention: none
connector:
  type: playwright
  package: connectors.worker.demo
healthcheck:
  cadence: daily
  synthetic_data_only: true
