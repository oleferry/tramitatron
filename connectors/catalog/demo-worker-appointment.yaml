id: demo.worker.appointment
name:
  es: Pedir cita con el médico
  ca-valencia: Demanar cita amb el metge
description:
  es: Acercas tu tarjeta sanitaria, eliges centro y hora, y el sistema reserva la cita por ti.
  ca-valencia: Acostes la teua targeta sanitària, tries centre i hora, i el sistema reserva la cita per tu.
territory: ES
execution_mode: integrated
risk_class: A1
status: available
official_sources: []
requirements:
  - es: Solo necesitas tu tarjeta sanitaria. No hace falta Cl@ve ni firma.
    ca-valencia: Només necessites la teua targeta sanitària. No cal Cl@ve ni signatura.
  - es: Antes de reservar te enseñamos la cita para que la confirmes tú.
    ca-valencia: Abans de reservar et mostrem la cita perquè la confirmes tu.
  - es: Demostración sobre un portal de pruebas; no toca ninguna administración real.
    ca-valencia: Demostració sobre un portal de proves; no toca cap administració real.
# Datos que salen del escaneo de la tarjeta sanitaria (número y primer apellido):
# es como se identifica de verdad una cita de atención primaria, sin Cl@ve.
required_fields:
  - sip_number
  - surname
# Datos NO sensibles que el kiosco pide antes de reservar. Las opciones
# coinciden con el asistente del portal.
intake:
  - key: center
    type: select
    label:
      es: ¿A qué centro de salud quieres ir?
      ca-valencia: A quin centre de salut vols anar?
    options:
      - value: valladolid-pilarica
        label:
          es: Valladolid — La Pilarica
          ca-valencia: Valladolid — La Pilarica
      - value: burgos-gamonal
        label:
          es: Burgos — Gamonal
          ca-valencia: Burgos — Gamonal
  - key: date
    type: select
    label:
      es: ¿Qué día?
      ca-valencia: Quin dia?
    options:
      - value: "2026-09-01"
        label:
          es: 1 de septiembre
          ca-valencia: 1 de setembre
      - value: "2026-09-02"
        label:
          es: 2 de septiembre
          ca-valencia: 2 de setembre
  - key: time
    type: select
    label:
      es: ¿A qué hora?
      ca-valencia: A quina hora?
    options:
      - value: "09:00"
        label:
          es: "09:00"
          ca-valencia: "09:00"
      - value: "10:30"
        label:
          es: "10:30"
          ca-valencia: "10:30"
confirmation_required: true
captcha_policy: user_only
document_retention: none
connector:
  type: playwright
  package: connectors.worker.demo
healthcheck:
  cadence: daily
  synthetic_data_only: true
